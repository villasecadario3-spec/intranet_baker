<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salas de Reunión — Baker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&family=Barlow+Condensed:ital,wght@0,300;0,500;0,700;0,900;1,700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@3.11.1/lib/msal-browser.min.js"></script>
    <style>
        :root {
            --rojo:#C0392B;--rojo-dark:#96281B;--negro:#111010;--negro-2:#1A1918;--negro-3:#242220;
            --borde-dark:#2E2C2A;--blanco:#FFFFFF;--crema:#F8F6F3;--gris-3:#B5B0AA;--txt-dark-mid:#9E9A96;
            --rojo-light:rgba(192,57,43,0.12);--ocupado-bg:rgba(192,57,43,0.15);--ocupado-brd:rgba(192,57,43,0.4);
            --libre-bg:rgba(26,122,74,0.13);--libre-brd:rgba(26,122,74,0.4);--verde:#27ae60;
            --card-bg:#222222;--card-brd:#333333;--gris-1:#2a2a2a;--gris-2:#363636;--txt-dim:#666;--txt-mid:#999;
        }
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        html{scroll-behavior:smooth}
        body{font-family:'Barlow',sans-serif;background:var(--negro);color:var(--blanco);min-height:100vh;overflow-x:hidden}
        nav{position:sticky;top:0;z-index:200;background:rgba(17,16,16,0.95);backdrop-filter:blur(24px);border-bottom:1px solid var(--borde-dark);height:60px;display:flex;align-items:center;padding:0 40px;gap:16px}
        .nav-logo{text-decoration:none;flex-shrink:0}
        .nav-logo img{height:26px;width:auto;display:block;background:white;border-radius:6px;padding:4px 10px}
        .nav-sep{width:1px;height:18px;background:var(--borde-dark)}
        .nav-back{display:flex;align-items:center;gap:6px;color:var(--gris-3);text-decoration:none;font-size:0.78rem;font-weight:500;transition:color 0.2s}
        .nav-back:hover{color:white}
        .nav-back svg{width:14px;height:14px}
        .nav-title{font-family:'DM Mono',monospace;font-size:0.72rem;color:var(--gris-3);letter-spacing:0.1em;text-transform:uppercase}
        .nav-spacer{flex:1}
        .nav-clock-wrap{text-align:right}
        .nav-clock{font-family:'Barlow Condensed',sans-serif;font-size:1.4rem;font-weight:300;letter-spacing:0.03em;line-height:1;color:white}
        .nav-fecha{font-size:0.68rem;color:var(--txt-dim);text-transform:capitalize;text-align:right;margin-top:2px}
        .user-chip{display:flex;align-items:center;gap:8px;padding:4px 12px 4px 4px;background:var(--negro-3);border:1px solid var(--borde-dark);border-radius:100px}
        .user-av{width:26px;height:26px;border-radius:50%;background:var(--rojo);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:0.72rem;font-weight:700;color:white}
        .user-nm{font-size:0.78rem;font-weight:500;color:white;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .btn-logout-nav{background:none;border:none;color:var(--txt-dim);cursor:pointer;font-size:0.7rem;padding:0;transition:color 0.15s}
        .btn-logout-nav:hover{color:var(--rojo)}
        .btn-login-nav{display:flex;align-items:center;gap:7px;padding:6px 14px;border-radius:7px;background:var(--rojo);border:none;color:white;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:0.78rem;font-weight:600;transition:background 0.2s;white-space:nowrap}
        .btn-login-nav:hover{background:var(--rojo-dark)}
        .btn-login-nav svg{width:14px;height:14px}
        .hero{padding:32px 40px 28px;display:grid;grid-template-columns:1fr auto;align-items:end;gap:40px;border-bottom:1px solid var(--card-brd);background:var(--negro);position:relative;overflow:hidden}
        .hero::before{content:'';position:absolute;inset:0;background-image:linear-gradient(var(--borde-dark) 1px,transparent 1px),linear-gradient(90deg,var(--borde-dark) 1px,transparent 1px);background-size:40px 40px;opacity:0.3}
        .hero::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 100% at 80% 50%,rgba(192,57,43,0.08) 0%,transparent 70%)}
        .hero h1{font-family:'Barlow Condensed',sans-serif;font-size:clamp(2rem,4vw,3.2rem);font-weight:900;line-height:0.88;letter-spacing:-0.02em;text-transform:uppercase;position:relative;z-index:2}
        .hero h1 em{font-style:italic;color:var(--rojo)}
        .hero p{margin-top:14px;font-size:0.88rem;color:var(--txt-mid);max-width:480px;line-height:1.65;font-weight:300;position:relative;z-index:2}
        .hero-stats{display:flex;gap:28px;flex-shrink:0;padding-bottom:4px;position:relative;z-index:2}
        .hstat{text-align:right}
        .hstat-n{font-family:'Barlow Condensed',sans-serif;font-size:3rem;font-weight:700;line-height:1}
        .hstat-n.v{color:var(--verde)}.hstat-n.o{color:var(--rojo)}
        .hstat-l{font-size:0.7rem;color:var(--txt-dim);text-transform:uppercase;letter-spacing:0.12em;margin-top:4px}
        .toolbar{padding:16px 40px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;border-bottom:1px solid var(--card-brd);background:var(--negro)}
        .view-toggle{display:flex;background:var(--gris-1);border:1px solid var(--card-brd);border-radius:10px;overflow:hidden}
        .view-btn{padding:7px 16px;background:transparent;border:none;color:var(--txt-dim);cursor:pointer;font-family:'Barlow',sans-serif;font-size:0.8rem;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;transition:all 0.2s}
        .view-btn.activo{background:var(--rojo);color:white}
        .nav-periodo{display:flex;align-items:center;gap:8px}
        .nav-btn{width:32px;height:32px;border-radius:7px;background:var(--gris-1);border:1px solid var(--card-brd);color:var(--blanco);cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
        .nav-btn:hover{background:var(--gris-2);border-color:#444}
        #periodo-label{font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:500;letter-spacing:0.05em;min-width:180px;text-align:center;text-transform:capitalize}
        .btn-hoy{padding:6px 14px;border-radius:7px;background:transparent;border:1px solid var(--card-brd);color:var(--txt-mid);cursor:pointer;font-family:'Barlow',sans-serif;font-size:0.8rem;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;transition:all 0.2s}
        .btn-hoy:hover{border-color:#555;color:white}
        .tb-spacer{flex:1}
        .sync-info{display:flex;align-items:center;gap:7px;font-size:0.75rem;color:var(--txt-dim)}
        .sync-dot{width:7px;height:7px;border-radius:50%;background:var(--verde);opacity:0;transition:opacity 0.3s}
        .main{padding:28px 40px 80px;background:var(--negro)}
        #vista-semana{display:block}#vista-mes{display:none}
        .salas-tabs{display:flex;gap:4px;margin-bottom:20px;border-bottom:1px solid var(--card-brd)}
        .sala-tab{padding:9px 18px;background:transparent;border:none;color:var(--txt-dim);cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:0.9rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.15s}
        .sala-tab:hover{color:var(--blanco)}.sala-tab.activo{color:var(--blanco);border-bottom-color:var(--rojo)}
        .semana-wrap{overflow-x:auto;border:1px solid var(--card-brd);border-radius:14px}
        .semana-grid{display:grid;grid-template-columns:54px repeat(5,1fr);min-width:700px}
        .sg-corner{background:var(--gris-1);border-bottom:1px solid var(--card-brd)}
        .sg-dia-header{background:var(--gris-1);border-bottom:1px solid var(--card-brd);border-left:1px solid var(--card-brd);padding:12px 10px 10px;text-align:center}
        .sg-dia-nombre{font-family:'Barlow Condensed',sans-serif;font-size:0.7rem;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;color:var(--txt-dim)}
        .sg-dia-num{font-family:'Barlow Condensed',sans-serif;font-size:1.5rem;font-weight:700;line-height:1;margin-top:2px}
        .sg-dia-header.hoy .sg-dia-num{color:var(--rojo)}.sg-dia-header.hoy .sg-dia-nombre{color:var(--rojo)}
        .sg-hora-cell{padding:0 8px;display:flex;align-items:flex-start;justify-content:flex-end;border-right:1px solid var(--card-brd)}
        .sg-hora-label{font-family:'Barlow Condensed',sans-serif;font-size:0.7rem;color:var(--txt-dim);transform:translateY(-8px);white-space:nowrap}
        .sg-day-col{border-left:1px solid var(--card-brd);position:relative}
        .bloque{position:absolute;left:3px;right:3px;background:var(--ocupado-bg);border:1px solid var(--ocupado-brd);border-radius:5px;display:flex;align-items:center;justify-content:center;overflow:hidden;transition:all 0.2s;z-index:2}
        .bloque:hover{background:rgba(192,57,43,0.25);border-color:var(--rojo);transform:scaleX(1.02)}
        .bloque-inner{font-family:'Barlow Condensed',sans-serif;font-size:0.75rem;font-weight:700;color:#fff;letter-spacing:0.06em;text-transform:uppercase;text-align:center;padding:2px 6px;text-shadow:0 1px 3px rgba(0,0,0,0.5)}
        .linea-ahora{position:absolute;left:0;right:0;height:2px;background:var(--rojo);z-index:10;pointer-events:none}
        .linea-ahora::before{content:'';position:absolute;left:-4px;top:-4px;width:10px;height:10px;border-radius:50%;background:var(--rojo)}
        .slot-libre{position:absolute;left:3px;right:3px;border-radius:5px;cursor:pointer;background:transparent;transition:background 0.15s;z-index:1}
        .slot-libre:hover{background:rgba(39,174,96,0.12);border:1px dashed rgba(39,174,96,0.4)}
        .slot-libre:hover::after{content:'+ Agendar';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Barlow Condensed',sans-serif;font-size:0.7rem;font-weight:700;letter-spacing:0.1em;color:#5dde90;white-space:nowrap}
        .mes-salas-wrap{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
        .mes-sala-card{background:var(--card-bg);border:1px solid var(--card-brd);border-radius:14px;overflow:hidden}
        .mes-card-header{padding:14px 18px;border-bottom:1px solid var(--card-brd);display:flex;align-items:center;justify-content:space-between}
        .mes-card-nombre{font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase}
        .mes-card-count{font-size:0.72rem;color:var(--txt-dim);background:var(--gris-1);padding:3px 10px;border-radius:100px}
        .mini-cal{padding:14px 18px}
        .mini-cal-header{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:6px}
        .mini-cal-dh{text-align:center;font-size:0.62rem;font-weight:600;color:var(--txt-dim);letter-spacing:0.08em;text-transform:uppercase;padding:3px 0}
        .mini-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
        .mini-dia{aspect-ratio:1;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:0.72rem;font-weight:500;cursor:pointer;position:relative;transition:all 0.15s}
        .mini-dia:not(.vacio):not(.finde):hover{filter:brightness(1.3);transform:scale(1.08)}
        .mini-dia.vacio{background:transparent}.mini-dia.finde{opacity:0.2;background:transparent}.mini-dia.pasado{opacity:0.35}
        .mini-dia.libre{background:var(--libre-bg);border:1px solid var(--libre-brd);color:var(--verde)}
        .mini-dia.ocupado-parcial{background:rgba(192,57,43,0.08);border:1px solid rgba(192,57,43,0.25)}
        .mini-dia.ocupado-total{background:var(--ocupado-bg);border:1px solid var(--ocupado-brd);color:#ff8070}
        .mini-dia.hoy-dia{outline:2px solid var(--rojo);outline-offset:-2px}
        .mini-dia-num{font-size:0.68rem;line-height:1}.mini-dia-dots{display:flex;gap:2px;margin-top:2px}
        .mini-dot{width:4px;height:4px;border-radius:50%;background:var(--rojo)}
        .loading-overlay{position:fixed;inset:0;z-index:500;background:var(--negro);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity 0.5s}
        .loading-overlay.oculto{opacity:0;pointer-events:none}
        .load-logo{background:white;border-radius:10px;padding:10px 20px}
        .load-logo img{height:44px;width:auto;display:block}
        .load-bar-wrap{width:160px;height:2px;background:var(--borde-dark);border-radius:10px;overflow:hidden}
        .load-bar{height:100%;background:var(--rojo);border-radius:10px;animation:loadAnim 1.5s ease-in-out infinite}
        @keyframes loadAnim{0%{width:0%;margin-left:0}50%{width:60%;margin-left:20%}100%{width:0%;margin-left:100%}}
        .load-txt{font-size:0.72rem;color:var(--txt-dim);letter-spacing:0.15em;text-transform:uppercase;font-family:'DM Mono',monospace}
        footer{border-top:1px solid var(--borde-dark);padding:16px 40px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;background:var(--negro)}
        .footer-l{font-size:0.75rem;color:var(--txt-dim)}
        .leyenda-colores{display:flex;align-items:center;gap:14px;font-size:0.7rem;color:var(--txt-dim)}
        .lc-item{display:flex;align-items:center;gap:5px}
        .lc-box{width:11px;height:11px;border-radius:3px}
        .lc-box.libre{background:var(--libre-bg);border:1px solid var(--libre-brd)}
        .lc-box.ocupado{background:var(--ocupado-bg);border:1px solid var(--ocupado-brd)}
        .modal-overlay{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.75);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity 0.25s}
        .modal-overlay.visible{opacity:1;pointer-events:all}
        .modal{background:#222;border:1px solid #3a3a3a;border-radius:18px;width:100%;max-width:480px;overflow:hidden;transform:translateY(20px);transition:transform 0.25s}
        .modal-overlay.visible .modal{transform:translateY(0)}
        .modal-header{padding:22px 26px 18px;border-bottom:1px solid #333;display:flex;align-items:center;justify-content:space-between}
        .modal-titulo{font-family:'Barlow Condensed',sans-serif;font-size:1.2rem;font-weight:700;letter-spacing:0.05em;text-transform:uppercase}
        .modal-sala-badge{font-size:0.7rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;padding:3px 10px;border-radius:100px;background:var(--rojo-light);color:#ff8070;border:1px solid var(--ocupado-brd)}
        .modal-close{background:none;border:none;color:var(--txt-dim);cursor:pointer;font-size:1.4rem;line-height:1;padding:4px;transition:color 0.15s}
        .modal-close:hover{color:white}
        .modal-body{padding:22px 26px;display:flex;flex-direction:column;gap:14px}
        .form-group{display:flex;flex-direction:column;gap:5px}
        .form-label{font-size:0.72rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--txt-mid)}
        .form-input{padding:9px 13px;border-radius:8px;background:var(--gris-1);border:1px solid #3a3a3a;color:white;font-family:'Barlow',sans-serif;font-size:0.9rem;transition:border-color 0.2s;width:100%}
        .form-input:focus{outline:none;border-color:var(--rojo)}
        .form-input::placeholder{color:var(--txt-dim)}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
        .modal-footer{padding:0 26px 22px;display:flex;gap:10px}
        .btn-cancelar{flex:1;padding:10px;background:transparent;border:1px solid #3a3a3a;border-radius:8px;color:var(--txt-mid);cursor:pointer;font-family:'Barlow',sans-serif;font-size:0.88rem;font-weight:600;transition:all 0.2s}
        .btn-cancelar:hover{border-color:#555;color:white}
        .btn-agendar{flex:2;padding:10px;background:var(--rojo);border:none;border-radius:8px;color:white;cursor:pointer;font-family:'Barlow',sans-serif;font-size:0.88rem;font-weight:600;transition:background 0.2s;display:flex;align-items:center;justify-content:center;gap:8px}
        .btn-agendar:hover{background:var(--rojo-dark)}.btn-agendar:disabled{opacity:0.5;cursor:not-allowed}
        .modal-msg{margin:0 26px 18px;padding:9px 13px;border-radius:8px;font-size:0.83rem;display:none}
        .modal-msg.ok{background:rgba(39,174,96,0.15);border:1px solid rgba(39,174,96,0.3);color:#5dde90;display:block}
        .modal-msg.err{background:var(--ocupado-bg);border:1px solid var(--ocupado-brd);color:#ff8070;display:block}
        .chip{display:inline-flex;align-items:center;gap:6px;background:var(--rojo-light);border:1px solid var(--ocupado-brd);border-radius:100px;padding:4px 10px 4px 12px;font-size:0.78rem;font-weight:500;color:#ff9080}
        .chip-remove{background:none;border:none;color:#ff9080;cursor:pointer;font-size:1rem;line-height:1;padding:0;opacity:0.7}
        .chip-remove:hover{opacity:1}
        .sug-item{padding:9px 13px;cursor:pointer;display:flex;flex-direction:column;gap:2px;border-bottom:1px solid rgba(255,255,255,0.05);transition:background 0.15s}
        .sug-item:last-child{border-bottom:none}.sug-item:hover{background:rgba(255,255,255,0.06)}
        .sug-nombre{font-size:0.86rem;font-weight:500}.sug-email{font-size:0.73rem;color:var(--txt-dim)}
        @media(max-width:768px){nav{padding:0 16px}.hero{padding:24px 16px 20px;grid-template-columns:1fr}.hero-stats{justify-content:flex-start}.toolbar{padding:12px 16px}.main{padding:20px 16px 60px}footer{padding:14px 16px}}
    </style>
</head>
<body>
 
<div class="loading-overlay" id="loading">
    <div class="load-logo"><img src="LOGO_BAKER.png" alt="Baker" style="height:44px;width:auto;display:block" onerror="this.outerHTML='<span style=&quot;font-family:serif;font-weight:900;font-size:1.4rem;color:#C0392B&quot;>BAKER</span>'"></div>
    <div class="load-bar-wrap"><div class="load-bar"></div></div>
    <div class="load-txt">Cargando salas…</div>
</div>
 
<nav>
    <a class="nav-logo" href="index.html">
        <img src="LOGO_BAKER.png" alt="Baker" style="height:26px;width:auto;display:block;background:white;border-radius:6px;padding:4px 10px" onerror="this.outerHTML='<span style=&quot;font-family:serif;font-weight:900;color:white;font-size:1rem&quot;>BAKER</span>'">
    </a>
    <div class="nav-sep"></div>
    <a class="nav-back" href="index.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        Inicio
    </a>
    <div class="nav-sep"></div>
    <div class="nav-title">Salas de Reunión</div>
    <div class="nav-spacer"></div>
    <div id="auth-area">
        <button class="btn-login-nav" onclick="loginMicrosoft()">
            <svg viewBox="0 0 21 21" fill="none"><rect x="1" y="1" width="9" height="9" fill="#f25022"/><rect x="11" y="1" width="9" height="9" fill="#7fba00"/><rect x="1" y="11" width="9" height="9" fill="#00a4ef"/><rect x="11" y="11" width="9" height="9" fill="#ffb900"/></svg>
            Iniciar sesión
        </button>
    </div>
    <div class="nav-clock-wrap">
        <div class="nav-clock" id="nav-clock">00:00</div>
        <div class="nav-fecha" id="nav-fecha">—</div>
    </div>
</nav>
 
<section class="hero">
    <div>
        <h1>Disponibilidad<br>de <em>Salas</em></h1>
        <p>Consulta en tiempo real qué salas están libres. Actualizado cada 60 segundos.</p>
    </div>
    <div class="hero-stats">
        <div class="hstat"><div class="hstat-n v" id="stat-libres">—</div><div class="hstat-l">Disponibles</div></div>
        <div class="hstat"><div class="hstat-n o" id="stat-ocupadas">—</div><div class="hstat-l">Ocupadas</div></div>
    </div>
</section>
 
<div class="toolbar">
    <div class="view-toggle">
        <button class="view-btn activo" id="btn-semana" onclick="setVista('semana')">Semana</button>
        <button class="view-btn" id="btn-mes" onclick="setVista('mes')">Mes</button>
    </div>
    <div class="nav-periodo">
        <button class="nav-btn" onclick="navegar(-1)">&#8249;</button>
        <div id="periodo-label">—</div>
        <button class="nav-btn" onclick="navegar(1)">&#8250;</button>
    </div>
    <button class="btn-hoy" onclick="irHoy()">Hoy</button>
    <div class="tb-spacer"></div>
    <div class="sync-info"><div class="sync-dot" id="sync-dot"></div><span id="sync-label">—</span></div>
</div>
 
<div class="main">
    <div id="vista-semana">
        <div class="salas-tabs" id="salas-tabs"></div>
        <div class="semana-wrap"><div class="semana-grid" id="semana-grid"></div></div>
    </div>
    <div id="vista-mes"><div class="mes-salas-wrap" id="mes-salas-wrap"></div></div>
</div>
 
<footer>
    <div class="footer-l">Inmobiliaria Baker SPA &mdash; Salas de Reunión</div>
    <div class="leyenda-colores">
        <div class="lc-item"><div class="lc-box libre"></div> Disponible</div>

<script>
const SALAS = [
    { nombre:"Baker",   email:"salabaker@ibaker.cl",   color:"#C0392B" },
    { nombre:"Romeral", email:"salaromeral@ibaker.cl", color:"#E67E22" },
    { nombre:"CMC",     email:"salacmc@ibaker.cl",     color:"#8E44AD" },
    { nombre:"Río Nef", email:"salarionef@ibaker.cl",  color:"#2980B9" },
    { nombre:"Brotar",  email:"salabrotar@ibaker.cl",  color:"#16A085" },
];
const HORA_INI = 8, HORA_FIN = 20, SLOT_H = 48;
const API = "https://salasbaker.netlify.app/.netlify/functions/disponibilidad";
 
// ── CLAVE: parsear fechas en hora LOCAL ──────────────────────
// Las fechas vienen como "2026-06-15T10:15:00.0000000" (sin Z, hora local)
// Hay que ignorar los microsegundos y parsear directamente
function parseFechaLocal(str) {
    // Ej: "2026-06-16T09:30:00.0000000"
    // Quitar Z si existe, cortar en el punto para eliminar microsegundos
    const s = str.replace('Z','').split('.')[0]; // "2026-06-16T09:30:00"
    const [fecha, hora] = s.split('T');
    const [y, m, d] = fecha.split('-').map(Number);
    const [hh, mm, ss] = (hora||'00:00:00').split(':').map(Number);
    return new Date(y, m-1, d, hh, mm, ss||0);
}
 
function isoDateLocal(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,'0');
    const dd = String(d.getDate()).padStart(2,'0');
    return `${y}-${m}-${dd}`;
}
 
const msalConfig = {
    auth: {
        clientId:    "d9664e06-7fd2-401d-b27b-97116fed7d9f",
        authority:   "https://login.microsoftonline.com/87c9a653-b08e-42c9-92bc-260458dffc26",
        redirectUri: window.location.origin,
    },
    cache: { cacheLocation:"sessionStorage" }
};
const msalInstance = new msal.PublicClientApplication(msalConfig);
const SCOPES = ["Calendars.ReadWrite","User.Read","User.ReadBasic.All"];
let usuarioActual=null, tokenActual=null;
 
async function loginMicrosoft() {
    try {
        await msalInstance.initialize();
        const result = await msalInstance.loginPopup({ scopes:SCOPES });
        tokenActual = result.accessToken;
        usuarioActual = result.account;
        const DOMINIOS = ['@ibaker.cl','@cmcromeral.cl','@epbrotar.cl'];
        if (!DOMINIOS.some(d=>(usuarioActual.username||'').endsWith(d))) {
            await msalInstance.logoutPopup({ account:usuarioActual });
            usuarioActual=null; tokenActual=null;
            alert('Acceso restringido.');
            return;
        }
        actualizarUIAuth(); cache={}; render();
    } catch(e) { console.error("Login cancelado",e); }
}
 
async function getToken() {
    if (!usuarioActual) return null;
    try {
        await msalInstance.initialize();
        const r = await msalInstance.acquireTokenSilent({ scopes:SCOPES, account:usuarioActual });
        tokenActual=r.accessToken; return tokenActual;
    } catch(e) {
        const r = await msalInstance.acquireTokenPopup({ scopes:SCOPES });
        tokenActual=r.accessToken; return tokenActual;
    }
}
 
function logout() { msalInstance.logoutPopup(); usuarioActual=null; tokenActual=null; actualizarUIAuth(); }
 
function actualizarUIAuth() {
    const area = document.getElementById('auth-area');
    if (usuarioActual) {
        const nombre = usuarioActual.name||usuarioActual.username;
        const iniciales = nombre.split(' ').map(p=>p[0]).join('').slice(0,2).toUpperCase();
        area.innerHTML = `<div class="user-chip"><div class="user-av">${iniciales}</div><span class="user-nm">${nombre.split(' ').slice(0,2).join(' ')}</span><button class="btn-logout-nav" onclick="logout()">✕</button></div>`;
    } else {
        area.innerHTML = `<button class="btn-login-nav" onclick="loginMicrosoft()"><svg viewBox="0 0 21 21" fill="none" style="width:13px;height:13px"><rect x="1" y="1" width="9" height="9" fill="#f25022"/><rect x="11" y="1" width="9" height="9" fill="#7fba00"/><rect x="1" y="11" width="9" height="9" fill="#00a4ef"/><rect x="11" y="11" width="9" height="9" fill="#ffb900"/></svg>Iniciar sesión</button>`;
    }
}
 
async function intentarLoginSilencioso() {
    try {
        await msalInstance.initialize();
        const accounts = msalInstance.getAllAccounts();
        if (accounts.length>0) { usuarioActual=accounts[0]; await getToken(); actualizarUIAuth(); }
    } catch(e) {}
}
 
let asistentesSeleccionados=[], buscarTimeout=null;
async function buscarAsistentes(query) {
    const sugs=document.getElementById('sugerencias');
    if (!query||query.length<2) { sugs.style.display='none'; return; }
    clearTimeout(buscarTimeout);
    buscarTimeout=setTimeout(async()=>{
        const token=await getToken(); if(!token) return;
        try {
            const res=await fetch(`https://graph.microsoft.com/v1.0/users?$filter=startswith(displayName,'${encodeURIComponent(query)}')&$select=displayName,mail&$top=6`,{headers:{Authorization:`Bearer ${token}`}});
            const data=await res.json();
            const DOMINIOS=['@ibaker.cl','@cmcromeral.cl','@epbrotar.cl'];
            const usuarios=(data.value||[]).filter(u=>u.mail&&DOMINIOS.some(d=>u.mail.endsWith(d))&&!asistentesSeleccionados.find(a=>a.email===u.mail));
            if(!usuarios.length){sugs.style.display='none';return;}
            sugs.innerHTML=usuarios.map(u=>`<div class="sug-item" onclick="agregarAsistente('${u.displayName}','${u.mail}')"><div class="sug-nombre">${u.displayName}</div><div class="sug-email">${u.mail}</div></div>`).join('');
            sugs.style.display='block';
        } catch(e){}
    },300);
}
function agregarAsistente(nombre,email) {
    if(asistentesSeleccionados.find(a=>a.email===email)) return;
    asistentesSeleccionados.push({nombre,email});
    document.getElementById('f-buscar-asistente').value='';
    document.getElementById('sugerencias').style.display='none';
    renderChips();
}
function quitarAsistente(email) { asistentesSeleccionados=asistentesSeleccionados.filter(a=>a.email!==email); renderChips(); }
function renderChips() {
    document.getElementById('asistentes-chips').innerHTML=asistentesSeleccionados.map(a=>`<div class="chip">${a.nombre.split(' ').slice(0,2).join(' ')}<button class="chip-remove" onclick="quitarAsistente('${a.email}')">×</button></div>`).join('');
}
document.addEventListener('click',e=>{if(!e.target.closest('#f-buscar-asistente')&&!e.target.closest('#sugerencias')){const s=document.getElementById('sugerencias');if(s)s.style.display='none';}});
 
function abrirModal({salaEmail,salaNombre,fecha,horaIni,horaFin}) {
    if(!usuarioActual){loginMicrosoft();return;}
    document.getElementById('modal-sala-badge').innerText=salaNombre;
    document.getElementById('f-sala').value=salaEmail;
    document.getElementById('f-fecha').value=fecha||isoDateLocal(new Date());
    document.getElementById('f-inicio').value=horaIni||'09:00';
    document.getElementById('f-fin').value=horaFin||'10:00';
    document.getElementById('f-asunto').value='';
    document.getElementById('f-buscar-asistente').value='';
    asistentesSeleccionados=[];renderChips();
    document.getElementById('modal-msg').className='modal-msg';
    document.getElementById('btn-agendar').disabled=false;
    document.getElementById('btn-agendar-txt').innerText='Confirmar reserva';
    document.getElementById('modal-overlay').classList.add('visible');
}
function cerrarModal(e){if(e&&e.target!==document.getElementById('modal-overlay'))return;document.getElementById('modal-overlay').classList.remove('visible');}
async function confirmarReserva() {
    const asunto=document.getElementById('f-asunto').value.trim();
    const fecha=document.getElementById('f-fecha').value;
    const salaEmail=document.getElementById('f-sala').value;
    const inicio=document.getElementById('f-inicio').value;
    const fin=document.getElementById('f-fin').value;
    if(!asunto){mostrarMsgModal('err','Ingresa un asunto.');return;}
    if(!fecha){mostrarMsgModal('err','Selecciona una fecha.');return;}
    if(!inicio||!fin||inicio>=fin){mostrarMsgModal('err','Horario no válido.');return;}
    const token=await getToken();
    if(!token){mostrarMsgModal('err','Error de autenticación.');return;}
    document.getElementById('btn-agendar').disabled=true;
    document.getElementById('btn-agendar-txt').innerText='Agendando…';
    try {
        const res=await fetch('https://salasbaker.netlify.app/.netlify/functions/agendar',{
            method:'POST',headers:{'Content-Type':'application/json'},
            body:JSON.stringify({token,salaEmail,asunto,inicio:`${fecha}T${inicio}:00`,fin:`${fecha}T${fin}:00`,asistentes:asistentesSeleccionados.map(a=>a.email)})
        });
        const data=await res.json();
        if(res.ok){mostrarMsgModal('ok','✓ Reserva creada correctamente.');cache={};setTimeout(()=>{cerrarModal(null);render();},2000);}
        else{mostrarMsgModal('err',data.error||'No se pudo crear la reserva.');document.getElementById('btn-agendar').disabled=false;document.getElementById('btn-agendar-txt').innerText='Confirmar reserva';}
    } catch(e){mostrarMsgModal('err','Error de conexión.');document.getElementById('btn-agendar').disabled=false;document.getElementById('btn-agendar-txt').innerText='Confirmar reserva';}
}
function mostrarMsgModal(tipo,txt){const el=document.getElementById('modal-msg');el.className=`modal-msg ${tipo}`;el.innerText=txt;}
 
let vista='semana',salaActiva=0,offsetSemana=0,offsetMes=0,cache={};
 
function tickClock(){
    const n=new Date();
    document.getElementById('nav-clock').innerText=n.toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'});
    document.getElementById('nav-fecha').innerText=n.toLocaleDateString('es-CL',{weekday:'long',day:'numeric',month:'long'});
}
setInterval(tickClock,1000);tickClock();
 
function isoDate(d){return d.toISOString().split('T')[0];}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function startOfWeek(d){const r=new Date(d);const day=r.getDay();r.setDate(r.getDate()+(day===0?-6:1-day));r.setHours(0,0,0,0);return r;}
function daysInMonth(y,m){return new Date(y,m+1,0).getDate();}
function isToday(d){const t=new Date();return d.getFullYear()===t.getFullYear()&&d.getMonth()===t.getMonth()&&d.getDate()===t.getDate();}
function isPast(d){const t=new Date();t.setHours(0,0,0,0);return d<t;}
 
async function fetchBloques(email,fechaIni,fechaFin){
    const key=email+fechaIni;
    if(cache[key]) return cache[key];
    try{
        const res=await fetch(`${API}?email=${email}&fechaInicio=${fechaIni}T00:00:00Z&fechaFin=${fechaFin}T23:59:59Z`);
        const data=await res.json();
        cache[key]=data.bloques||[];return cache[key];
    }catch(e){return[];}
}
async function fetchSemana(sala,lunes,viernes){return fetchBloques(sala.email,isoDate(lunes),isoDate(viernes));}
async function fetchMes(sala,inicio,fin){return fetchBloques(sala.email,isoDate(inicio),isoDate(fin));}
 
async function actualizarStats(){
    const ahora=new Date(),hoy=isoDate(ahora);
    let libres=0,ocupadas=0;
    await Promise.all(SALAS.map(async sala=>{
        const bloques=await fetchBloques(sala.email,hoy,hoy);
        const ocupada=bloques.some(b=>{
            const i=parseFechaLocal(b.inicio),f=parseFechaLocal(b.fin);
            return ahora>=i&&ahora<=f;
        });
        ocupada?ocupadas++:libres++;
    }));
    document.getElementById('stat-libres').innerText=libres;
    document.getElementById('stat-ocupadas').innerText=ocupadas;
}
 
function setVista(v){
    vista=v;
    document.getElementById('btn-semana').classList.toggle('activo',v==='semana');
    document.getElementById('btn-mes').classList.toggle('activo',v==='mes');
    document.getElementById('vista-semana').style.display=v==='semana'?'block':'none';
    document.getElementById('vista-mes').style.display=v==='mes'?'block':'none';
    render();
}
function navegar(dir){if(vista==='semana')offsetSemana+=dir;else offsetMes+=dir;cache={};render();}
function irHoy(){offsetSemana=0;offsetMes=0;cache={};render();}
function render(){if(vista==='semana')renderSemana();else renderMes();}
 
function getLunesViernes(){
    const lunes=startOfWeek(new Date());
    lunes.setDate(lunes.getDate()+offsetSemana*7);
    return{lunes,viernes:addDays(lunes,4)};
}
 
function renderSemana(){
    const{lunes,viernes}=getLunesViernes();
    const opts={day:'numeric',month:'long'};
    document.getElementById('periodo-label').innerText=`${lunes.toLocaleDateString('es-CL',opts)} – ${viernes.toLocaleDateString('es-CL',opts)}`;
    document.getElementById('salas-tabs').innerHTML=SALAS.map((s,i)=>`
        <button class="sala-tab ${i===salaActiva?'activo':''}" onclick="setSalaActiva(${i})" style="${i===salaActiva?`border-bottom-color:${s.color}`:''}">
            ${s.nombre}</button>`).join('');
    buildGridSemana(lunes);
}
function setSalaActiva(idx){salaActiva=idx;renderSemana();}
 
async function buildGridSemana(lunes){
    const grid=document.getElementById('semana-grid');
    const sala=SALAS[salaActiva];
    const diasSemana=['Lun','Mar','Mié','Jue','Vie'];
    const totalHoras=HORA_FIN-HORA_INI,slotPx=SLOT_H;
 
    // ── Mostrar skeleton mientras carga ──────────────────────
    let html=`<div class="sg-corner" style="height:52px"></div>`;
    for(let d=0;d<5;d++){
        const dia=addDays(lunes,d);
        html+=`<div class="sg-dia-header ${isToday(dia)?'hoy':''}"><div class="sg-dia-nombre">${diasSemana[d]}</div><div class="sg-dia-num">${dia.getDate()}</div></div>`;
    }
    for(let h=HORA_INI;h<=HORA_FIN;h++){
        const label=h<HORA_FIN?`${String(h).padStart(2,'0')}:00`:'';
        html+=`<div class="sg-hora-cell" style="height:${slotPx}px"><span class="sg-hora-label">${label}</span></div>`;
        if(h<HORA_FIN) for(let d=0;d<5;d++) html+=`<div class="sg-day-col" id="col-${d}-${h}" style="height:${slotPx}px"></div>`;
    }
    grid.style.gridTemplateRows=`52px repeat(${totalHoras},${slotPx}px)`;
    grid.innerHTML=html;
 
    // ── CLAVE: esperar los datos ANTES de pintar bloques ─────
    const bloques = await fetchSemana(sala,lunes,addDays(lunes,4));
 
    for(let d=0;d<5;d++){
        const dia=addDays(lunes,d);
        // Usamos isoDateLocal para comparar en hora local, no UTC
        const diaStr=isoDateLocal(dia);
 
        if(usuarioActual){
            for(let h=HORA_INI;h<HORA_FIN;h++){
                const colEl=document.getElementById(`col-${d}-${h}`);if(!colEl)continue;
                const sl=document.createElement('div');sl.className='slot-libre';sl.style.cssText=`top:0;height:${slotPx}px;`;
                sl.onclick=()=>abrirModal({salaEmail:sala.email,salaNombre:sala.nombre,fecha:isoDateLocal(dia),horaIni:String(h).padStart(2,'0')+':00',horaFin:String(h+1).padStart(2,'0')+':00'});
                colEl.appendChild(sl);
            }
        }
 
        if(isToday(dia)){
            const ahora=new Date(),min=(ahora.getHours()-HORA_INI)*60+ahora.getMinutes();
            if(min>=0&&min<=totalHoras*60){
                const col=document.getElementById(`col-${d}-${HORA_INI}`);
                if(col){const l=document.createElement('div');l.className='linea-ahora';l.style.cssText=`top:${(min/60)*slotPx}px;position:absolute;left:0;right:0;z-index:10;`;col.style.position='relative';col.appendChild(l);}
            }
        }
 
        // ── Pintar bloques usando hora LOCAL ─────────────────
        bloques.forEach(b=>{
            const ini=parseFechaLocal(b.inicio);
            const fin=parseFechaLocal(b.fin);
 
            // Comparar fecha del bloque con el día de la columna en hora local
            if(isoDateLocal(ini)!==diaStr) return;
 
            const iniMin=(ini.getHours()-HORA_INI)*60+ini.getMinutes();
            const finMin=(fin.getHours()-HORA_INI)*60+fin.getMinutes();
            if(finMin<=0||iniMin>=totalHoras*60) return;
 
            const heightPx=Math.max(4,(finMin-iniMin)/60*slotPx-2);
            const horaRef=HORA_INI+Math.floor(iniMin/60);
            const colEl=document.getElementById(`col-${d}-${horaRef}`);if(!colEl)return;
 
            const bloque=document.createElement('div');bloque.className='bloque';
            bloque.style.cssText=`top:${(iniMin%60)/60*slotPx}px;height:${heightPx}px;position:absolute;left:3px;right:3px;`;
            bloque.title=b.organizador?`${b.organizador} · ${ini.toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'})}–${fin.toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'})}`:'Ocupado';
            const nombre=b.organizador?b.organizador.split(' ').slice(0,2).join(' '):'Ocupado';
            bloque.innerHTML=heightPx>20?`<div class="bloque-inner">${nombre}</div>`:'';
            colEl.style.position='relative';colEl.appendChild(bloque);
        });
    }
    document.getElementById('sync-label').innerText=`Act. ${new Date().toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'})}`;
}
 
function getMesActual(){return new Date(new Date().getFullYear(),new Date().getMonth()+offsetMes,1);}
function renderMes(){
    const mes=getMesActual();
    document.getElementById('periodo-label').innerText=mes.toLocaleDateString('es-CL',{month:'long',year:'numeric'});
    const wrap=document.getElementById('mes-salas-wrap');
    wrap.innerHTML=SALAS.map((s,i)=>`
        <div class="mes-sala-card"><div class="mes-card-header"><div class="mes-card-nombre" style="color:${s.color}">${s.nombre}</div><div class="mes-card-count" id="count-${i}">—</div></div>
        <div class="mini-cal" id="mcal-${i}"><div style="text-align:center;font-size:0.75rem;color:var(--txt-dim);padding:20px 0">Cargando…</div></div></div>`).join('');
    SALAS.forEach((sala,idx)=>buildMiniCal(sala,idx,mes));
}
async function buildMiniCal(sala,idx,mes){
    const year=mes.getFullYear(),month=mes.getMonth(),total=daysInMonth(year,month);
    const primerDia=new Date(year,month,1).getDay(),offset=primerDia===0?6:primerDia-1;
    const bloques=await fetchMes(sala,new Date(year,month,1),new Date(year,month,total));
    const porDia={};
    bloques.forEach(b=>{
        const d=isoDateLocal(parseFechaLocal(b.inicio));
        if(!porDia[d])porDia[d]=0;porDia[d]++;
    });
    const hoyStr=isoDateLocal(new Date());
    let totalR=0;Object.values(porDia).forEach(v=>totalR+=v);
    document.getElementById(`count-${idx}`).innerText=`${totalR} reserva${totalR!==1?'s':''}`;
    const dias=['L','M','X','J','V','S','D'];
    let html=`<div class="mini-cal-header">${dias.map(d=>`<div class="mini-cal-dh">${d}</div>`).join('')}</div><div class="mini-cal-grid">`;
    for(let i=0;i<offset;i++)html+=`<div class="mini-dia vacio"></div>`;
    for(let d=1;d<=total;d++){
        const fecha=new Date(year,month,d),fStr=isoDateLocal(fecha);
        const esFinde=fecha.getDay()===0||fecha.getDay()===6,esHoy=fStr===hoyStr,esPasado=isPast(fecha)&&!esHoy,reservas=porDia[fStr]||0;
        let clase='',dotsHtml='';
        if(esFinde){clase='finde';}
        else if(esPasado){clase='pasado'+(reservas>0?' ocupado-parcial':'');}
        else if(reservas===0){clase='libre';}
        else if(reservas>=4){clase='ocupado-total';}
        else{clase='ocupado-parcial';dotsHtml=`<div class="mini-dia-dots">${'<div class="mini-dot"></div>'.repeat(Math.min(reservas,3))}</div>`;}
        if(esHoy)clase+=' hoy-dia';
        const click=(!esFinde&&!esPasado)?`onclick="irASemana('${fStr}')"`:'' ;
        html+=`<div class="mini-dia ${clase}" ${click}><div class="mini-dia-num">${d}</div>${dotsHtml}</div>`;
    }
    html+=`</div>`;
    document.getElementById(`mcal-${idx}`).innerHTML=html;
}
 
function irASemana(fechaStr){
    const fecha=new Date(fechaStr+'T12:00:00'),lunesHoy=startOfWeek(new Date()),lunesFecha=startOfWeek(fecha);
    offsetSemana=Math.round((lunesFecha-lunesHoy)/(7*24*60*60*1000));
    cache={};setVista('semana');window.scrollTo({top:0,behavior:'smooth'});
}
 
async function syncAll(){
    const dot=document.getElementById('sync-dot');dot.style.opacity='1';
    cache={};await actualizarStats();render();
    setTimeout(()=>dot.style.opacity='0',800);
}
 
async function init(){
    await intentarLoginSilencioso();
    render();
    await actualizarStats();
    document.getElementById('loading').classList.add('oculto');
    setTimeout(()=>document.getElementById('loading').remove(),600);
}
 
setInterval(syncAll,60000);
init();
</script>
</body>
